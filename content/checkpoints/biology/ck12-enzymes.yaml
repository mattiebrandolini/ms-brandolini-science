practice_questions:
  - q: "A patient has a fever of 105°F. Explain what is happening to their enzymes and why this is dangerous."
  - q: "What is the difference between a reactant and a product?"
  - q: "What is activation energy, and why is it a problem for living things?"
  - q: "What do enzymes do? (Answer in one sentence.)"
  - q: "What is the active site, and why does its shape matter?"
  - q: "What is the difference between the lock-and-key model and the induced fit model?"
  - q: 'What does "denaturation" mean? What causes it?'
  - q: "Why does pepsin work in the stomach but not in the small intestine?"
  - q: "What happens to someone who does not produce enough lactase?"
  - q: 'An enzyme ends in "-ase." Its substrate is called "sucrose." What do you think the enzyme''s name is?'

