id: ck12
title: Water Properties
course: biology
icon: 💧
banner_class: ck-entry-banner--bio
quiz_info:
  format: Paper quiz — 3–4 open response scenarios. You explain what's happening at the molecular level. No multiple choice.
  notes: You can use your <strong>handwritten notes</strong>. No phones, no Chromebooks.
  grading: <strong>Pass = full points.</strong> If you don't pass, retake with different questions until you do.
  warning: This quiz tests <strong>understanding, not memorization</strong>. If you memorize definitions, you will struggle. If you understand <em>why</em> water behaves the way it does (hydrogen bonds between polar molecules), you will do well.
  readiness:
    - Explain what makes water a <em>polar</em> molecule
    - Explain how polarity leads to <em>hydrogen bonds</em>
    - For each of the four properties — explain how <em>hydrogen bonds create it</em>
    - For each property — explain <em>why it matters for living things</em>

language_bridge:
  title: Language Bridge Strategy
  steps:
    - icon: 1️⃣
      text: Watch the video in YOUR language first — focus on understanding the science
    - icon: 2️⃣
      text: Watch the English video — now you already know the ideas, focus on the English vocabulary
    - icon: 3️⃣
      text: Practice explaining in English using the reading passage and your notes
  note: The quiz is in English. Your notes can be in any language.

chapters:
  - id: ch1
    title: Water Structure & Polarity
    subtitle: Why water acts like a tiny magnet — and why that matters for everything
    video:
      id: 3jwAGWky98c
      title: Hydrogen Bonding and Water
      channel: Professor Dave Explains
      time: "8:43"
    l1_videos:
      es: { id: crIULw8PLgc, title: "¿Por qué la molécula de agua es polar y forma puentes de hidrógeno?", channel: "BioProfe", time: "10:32" }
    reading: |
      <p>You are made of water. About 60% of your body is water. Every cell in every living thing on Earth depends on water to survive.</p>

      <p>But why water? Why not some other liquid?</p>

      <p>The answer: water has special properties that no other common liquid has. These properties come from the structure of the water molecule itself. <strong class="ck-hl">Once you understand the structure, everything else makes sense.</strong></p>

      <p>A water molecule is small: one oxygen atom bonded to two hydrogen atoms (H₂O). The two hydrogen atoms attach at an angle, making a bent shape — like a wide "V" with oxygen at the point.</p>

      <p>The bonds holding water together are <dfn data-def="A bond where atoms share electrons — the strongest type of bond within a molecule" tabindex="0">covalent bonds</dfn> — the atoms share electrons. But here's what makes water special: <strong>they don't share equally.</strong></p>

      <p>Oxygen is bigger than hydrogen. It has more protons in its nucleus, so it pulls harder on the shared electrons. The electrons spend more time near the oxygen and less time near the hydrogens.</p>

      <p>This creates an uneven distribution of charge: the oxygen side gets a slight negative charge (δ−) and the hydrogen side gets a slight positive charge (δ+).</p>

      <p>A molecule with a positive end and a negative end is called a <dfn data-def="A molecule with a slightly positive end and a slightly negative end, because electrons are shared unequally — like a tiny magnet" tabindex="0">polar molecule</dfn>. Think of it like a tiny magnet.</p>

      <p>Because water molecules are polar, they attract each other. The slightly positive hydrogen (δ+) of one water molecule is attracted to the slightly negative oxygen (δ−) of another. This attraction is called a <dfn data-def="A weak attraction between the slightly positive hydrogen of one molecule and the slightly negative oxygen of another — about 20 times weaker than a covalent bond" tabindex="0">hydrogen bond</dfn>.</p>

      <p>Hydrogen bonds are weaker than covalent bonds — about 20 times weaker. But water molecules form <em>many</em> of them. Each water molecule can form up to four hydrogen bonds at once. Together, these bonds create a network that holds water molecules together.</p>

      <p><strong class="ck-hl">Every special property of water exists because of hydrogen bonds. Understand hydrogen bonds = understand water.</strong></p>
    terms:
      - ["Covalent bond", "a bond where atoms share electrons — the strongest type of bond within a molecule"]
      - ["Polar molecule", "a molecule with a slightly positive end and a slightly negative end (like a tiny magnet)"]
      - ["Hydrogen bond", "a weak attraction between the δ+ hydrogen of one molecule and the δ− oxygen of another"]
    figure:
      src: https://upload.wikimedia.org/wikipedia/commons/f/f9/3D_model_hydrogen_bonds_in_water.jpg
      alt: Several water molecules connected by dotted lines showing hydrogen bonds between them
      caption: "Hydrogen bonds (dotted lines) connecting water molecules. Each molecule can form up to four hydrogen bonds."
      source: Wikimedia Commons
      source_url: https://commons.wikimedia.org/wiki/File:3D_model_hydrogen_bonds_in_water.jpg
      license: CC BY-SA 3.0
    optional_videos:
      - { id: qwlk_8FDUEM, title: "Water - Subtances, Pair Molecules, and Interactions", channel: "Bozeman Science", time: "9:53" }

  - id: ch2
    title: The Four Properties of Water
    subtitle: "Cohesion, adhesion, high specific heat, and evaporative cooling — all from hydrogen bonds"
    video:
      id: iOOvX0jmhJ4
      title: Properties of Water
      channel: Amoeba Sisters
      time: "7:45"
    l1_videos:
      es: { id: v3Gon6bEaIs, title: "Propiedades fisicoquímicas del agua", channel: "Biología desde Cero", time: "8:10" }
    reading: |
      <p>Hydrogen bonds give water four important properties that make life possible.</p>

      <p><strong class="ck-hl">Property 1: Cohesion — Water Sticks to Water</strong></p>

      <p><dfn data-def="The attraction between molecules of the SAME substance — water sticking to water" tabindex="0">Cohesion</dfn> means water molecules stick to each other. When one water molecule moves, it pulls its neighbors along.</p>

      <p>Cohesion creates <dfn data-def="A 'skin' on the water's surface caused by extra hydrogen bonds between surface molecules — lets insects walk on water" tabindex="0">surface tension</dfn> — a kind of "skin" on the water's surface. Molecules at the surface form extra hydrogen bonds with their side neighbors, making the surface stronger. This is why a water strider insect can walk on water and why a paperclip can float even though metal is denser than water.</p>

      <p><strong class="ck-hl">Property 2: Adhesion — Water Sticks to Other Things</strong></p>

      <p><dfn data-def="The attraction between molecules of DIFFERENT substances — water sticking to glass, paper, or plant tubes" tabindex="0">Adhesion</dfn> means water sticks to other surfaces. Because water is polar, it's attracted to other polar or charged surfaces.</p>

      <p>Cohesion and adhesion work together for <dfn data-def="The ability of water to move upward through narrow tubes against gravity — uses adhesion and cohesion together" tabindex="0">capillary action</dfn>. In a plant: water sticks to the tube walls (adhesion), moving water pulls other water molecules behind it (cohesion), and water rises like a rope being pulled. This is how trees over 100 meters tall move water from roots to leaves — no pump needed!</p>

      <p><strong class="ck-hl">Property 3: High Specific Heat — Water Resists Temperature Change</strong></p>

      <p><dfn data-def="The amount of energy needed to raise the temperature of a substance — water's is very high because heat has to break hydrogen bonds first" tabindex="0">Specific heat</dfn> is the energy needed to raise temperature. Water has HIGH specific heat — it takes a lot of energy to heat it up.</p>

      <p>Here's why: when you add heat to water, the energy first has to <em>break hydrogen bonds</em>. Only after many bonds break does temperature rise. So you need a LOT of energy to heat water. Same in reverse — water releases heat slowly when cooling.</p>

      <p>This matters for life: your cells produce heat when making energy, and water absorbs it without getting too hot. Oceans moderate climate — coasts don't get as hot or cold as inland areas.</p>

      <p><strong class="ck-hl">Property 4: Evaporative Cooling — Sweating Works!</strong></p>

      <p><dfn data-def="When water evaporates, it takes heat energy with it, cooling what it leaves behind — this is how sweating cools your body" tabindex="0">Evaporative cooling</dfn> happens when water becomes a gas. To become vapor, water must break ALL hydrogen bonds. Breaking bonds takes energy. Where does that energy come from? <strong>From the surroundings — including your skin.</strong></p>

      <p>When you sweat: your body produces sweat on your skin, the highest-energy water molecules escape as gas, they take energy WITH them when they leave, and your skin loses heat — you feel cooler. This is also why dogs pant and plants release water through leaves.</p>
    terms:
      - ["Cohesion", "attraction between molecules of the SAME substance (water sticking to water)"]
      - ["Adhesion", "attraction between molecules of DIFFERENT substances (water sticking to other things)"]
      - ["Surface tension", "the 'skin' on water's surface created by extra hydrogen bonds between surface molecules"]
      - ["Capillary action", "water moving upward through narrow tubes against gravity using adhesion + cohesion"]
      - ["Specific heat", "the amount of energy needed to raise the temperature of a substance"]
      - ["Evaporative cooling", "when water evaporates, it takes heat energy with it and cools what's left behind"]
    figure:
      src: https://upload.wikimedia.org/wikipedia/commons/e/e2/Water_surface_tension_3.jpg
      alt: A paperclip floating on the surface of water due to surface tension
      caption: "A paperclip floats on water — even though metal is denser than water! This is surface tension created by cohesion."
      source: Wikimedia Commons
      source_url: https://commons.wikimedia.org/wiki/File:Water_surface_tension_3.jpg
      license: CC BY-SA 3.0

  - id: ch3
    title: Water and Life
    subtitle: "How water's properties keep living things alive — from plants to your body temperature"
    video:
      id: HVT3Y3_gHGg
      title: Water and Life
      channel: Amoeba Sisters
      time: "7:27"
    l1_videos:
      es: { id: 7oMYnj2lz7U, title: "El Agua y la Vida", channel: "A Cierta Ciencia", time: "6:20" }
    reading: |
      <p><strong class="ck-hl">The Chain: Structure → Polarity → Hydrogen Bonds → Properties → Life</strong></p>

      <p>Everything special about water starts with one fact: oxygen pulls electrons more strongly than hydrogen. This makes water polar. Polarity creates hydrogen bonds. Hydrogen bonds create the four properties. And those properties make life possible.</p>

      <p><strong>Capillary action keeps plants alive.</strong> Inside a plant stem, water moves up through tiny tubes called <dfn data-def="The tissue in plants that transports water and minerals upward from roots to leaves" tabindex="0">xylem</dfn>. Adhesion makes water stick to the tube walls. Cohesion pulls other water molecules behind it. Together, they move water from roots to leaves against gravity — no pump needed.</p>

      <p><strong>Water controls your body temperature.</strong> <dfn data-def="Maintaining stable internal conditions — your body constantly works to keep temperature, pH, and water balance in a narrow range" tabindex="0">Homeostasis</dfn> means keeping your body stable. Your body uses water to control temperature through a feedback loop:</p>

      <p><strong>Stimulus:</strong> Body temperature rises (from exercise or hot weather).<br/>
      <strong>Response:</strong> Sweat glands produce sweat on your skin.<br/>
      <strong>Result:</strong> Evaporative cooling lowers your temperature back to normal.</p>

      <p>Without water's high specific heat (absorbing heat) and evaporative cooling (removing heat), your body couldn't regulate temperature.</p>

      <p><strong class="ck-hl">Why is water special? Hydrogen bonds.</strong><br/>
      Why do hydrogen bonds exist? <strong>Polarity.</strong><br/>
      Why is water polar? <strong>Oxygen is greedy for electrons.</strong></p>

      <p>That's it. One molecular structure → all the properties that make life possible.</p>
    terms:
      - ["Xylem", "tissue in plants that transports water and minerals upward from roots to leaves"]
      - ["Homeostasis", "maintaining stable internal conditions (temperature, pH, water balance)"]
    figure:
      src: https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Xylem_and_phloem_diagram.svg/1280px-Xylem_and_phloem_diagram.svg.png
      alt: Plant diagram showing water and minerals moving up through xylem tubes
      caption: "Inside a plant stem: water moves up through xylem tubes using adhesion (sticking to walls) and cohesion (pulling other water molecules behind it)."
      source: Wikimedia Commons
      source_url: https://commons.wikimedia.org/wiki/File:Xylem_and_phloem_diagram.svg
      license: CC BY-SA 4.0
    optional_videos:
      - { id: HVT3Y3_gHGg, title: "Water: A Polar Molecule", channel: "Bozeman Science", time: "6:38" }

notes:
  intro: "HUGE HINT: Answer these questions while you study each section. They become your open notes on quiz day!"
  foundation: "These questions practice the SAME skills the quiz tests. If you can answer all of these, you can pass EVERY version of the quiz."
  parts:
    - title: "Part A: Water's Structure and Polarity"
      icon: 💧
      questions:
        - id: n1
          type: short
          q: "In your own words, explain what makes a water molecule polar. Use the words \"electrons,\" \"oxygen,\" and \"hydrogen\" in your answer."
        - id: n2
          type: table
          q: |
            A water molecule has two sides with different charges. Fill in:

            | Part of the molecule | Charge (+ or −)? | Why does it have that charge? |
            |---|---|---|
            | Oxygen side | ___ | ___ |
            | Hydrogen side | ___ | ___ |
        - id: n3
          type: short
          q: "Explain how polarity leads to hydrogen bonds. What attracts to what? Be specific about which part of one water molecule is attracted to which part of another."
        - id: n4
          type: short
          q: "From memory, write three facts about hydrogen bonds: (a) How strong are they compared to covalent bonds? (b) How many can one water molecule form? (c) What do they create when many water molecules bond together?"

    - title: "Part B: The Four Properties of Water"
      icon: 🔬
      questions:
        - id: n5
          type: table
          q: |
            For each property, explain what it means AND how hydrogen bonds cause it:

            | Property | What does it mean? | How do hydrogen bonds cause it? |
            |---|---|---|
            | Cohesion | ___ | ___ |
            | Adhesion | ___ | ___ |
            | High Specific Heat | ___ | ___ |
            | Evaporative Cooling | ___ | ___ |
        - id: n6
          type: short
          q: "Cohesion creates surface tension. In your own words, explain what surface tension is and give one example you can picture in your head."
        - id: n7
          type: fill
          q: |
            Adhesion and cohesion work together for capillary action. Fill in the steps:

            Step 1 (adhesion does what?): ___
            Step 2 (cohesion does what?): ___
            Step 3 (result?): ___
        - id: n8
          type: short
          q: "High specific heat means water is hard to heat up. Explain WHY — what is the heat energy doing at the molecular level before the temperature rises?"
        - id: n9
          type: fill
          q: |
            Evaporative cooling: When water becomes a gas, it must break ALL hydrogen bonds. Fill in the steps:

            Step 1: Which water molecules escape first — fast or slow ones? ___
            Step 2: What do they take with them when they leave? ___
            Step 3: What happens to whatever is left behind? ___
        - id: n10
          type: table
          q: |
            For each property, write ONE reason it matters for living things:

            | Property | Why does it matter for life? |
            |---|---|
            | Cohesion + Adhesion | ___ |
            | High Specific Heat | ___ |
            | Evaporative Cooling | ___ |

    - title: "Part C: Connecting It All"
      icon: 🔗
      questions:
        - id: n11
          type: table
          q: |
            Write the chain from memory. Fill in each box:

            | Step | Explain |
            |---|---|
            | STRUCTURE | What is special about oxygen vs. hydrogen? |
            | POLARITY | What does this create in the water molecule? |
            | HYDROGEN BONDS | How do water molecules attract each other? |
            | PROPERTIES | List the 4 properties |
            | LIFE | Give one example of how water keeps living things alive |
        - id: n12
          type: short
          q: "Make your own analogy: \"Hydrogen bonds in water are like ___ because ___.\""

    - title: "Part D: Homeostasis"
      icon: 🌡️
      questions:
        - id: n13
          type: table
          q: |
            Homeostasis means keeping your body stable. Your body uses water to control temperature. Fill in the feedback loop:

            | Step | What happens? |
            |---|---|
            | Stimulus (what goes wrong?) | ___ |
            | Response (what does the body do?) | ___ |
            | Result (how is balance restored?) | ___ |
        - id: n14
          type: short
          q: "Which TWO properties of water make temperature regulation possible? Explain what each one does."

