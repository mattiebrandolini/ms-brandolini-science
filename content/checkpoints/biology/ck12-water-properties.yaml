practice_questions:
  - q: "You put a metal paperclip on the surface of a glass of water and it floats. Your friend says \"that's because the paperclip is lighter than water.\" Is your friend correct? Explain what is really happening at the molecular level."
    hint: "Think about surface tension and what creates it."
  - q: "A giant redwood tree is over 100 meters tall. Explain how water gets from the roots to the very top leaves without any pump."
    hint: "Two properties of water work together for this."
  - q: "On a hot day, you run outside and start sweating. Trace the process from start to finish — why does sweating cool you down? Use the words \"hydrogen bonds\" and \"energy\" in your answer."
  - q: "Your friend says: \"Water heats up just like everything else.\" Is this correct? Explain why water is different from most other liquids when you add heat."
    hint: "What does the heat energy do before temperature rises?"
  - q: "Imagine a planet where water was NOT polar. Which of water's four properties would disappear? Explain why."
  - q: "A student writes: \"Cohesion is water sticking to water. Adhesion is water sticking to other things.\" This definition is correct but incomplete. What is MISSING from this answer?"
    hint: "What causes cohesion and adhesion? WHY does water stick?"

